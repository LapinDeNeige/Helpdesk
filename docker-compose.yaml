services:
  db:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_PASSWORD: QHF6nDVMRWyG 
      MARIADB_DATABASE: ticketsdb
      MARIADB_USER: user
      MARIADB_ROOT_PASSWORD: hl77AqnP1uG6  
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  nodejs-helpdesk:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    #depends_on:
    #  - db
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_PASSWORD: QHF6nDVMRWyG
      DB_USER: user
      DB_NAME: ticketsdb
  
    command: sh -c "npx knex migrate:latest&&node app.js"
    #command: sh -c "until nc -z db 3306; do echo 'Waiting...'; sleep 10; done; npx knex migrate:latest"
    #volumes: 

volumes:
  db_data: 

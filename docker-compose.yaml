services:
  db:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_PASSWORD: 12345
      MARIADB_DATABASE: ticketsdb
      #MARIADB_USER: user
      MARIADB_ROOT_PASSWORD: QHF6nDVMRWyG
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  nodejs-helpdesk:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    #depends_on:
    #  - db
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_PASSWORD: QHF6nDVMRWyG
      DB_USER: root
      DB_NAME: ticketsdb
      
    #command: sh -c "npx knex migrate:latest && node app.js"
    #command: sh -c "until nc -z db 3306; do echo 'Waiting for MySQL...'; sleep 2; done; node app.js"
    #volumes: 
    #  - .:/home/user/Projects/Projects/Helpdesk-three/Helpdesk
    #  - ./logs:/usr/src/a

volumes:
  db_data: 
